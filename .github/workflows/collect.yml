# Archivage quotidien des traces (fenêtre glissante 24h → filtre journée UTC).
# 21h45 UTC = fin de journée aérienne. Le push déclenche le redeploy Vercel →
# la nouvelle journée apparaît dans le sélecteur de l'app.
name: collect-traces

on:
  schedule:
    - cron: "45 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # le script sort en erreur si un téléchargement échoue (visibilité),
      # mais les traces déjà téléchargées doivent être committées quand même —
      # la fenêtre upstream glisse, ce qui n'est pas archivé ce soir est perdu
      - id: collect
        run: node scripts/collect-traces.mjs
        continue-on-error: true
      - name: Commit des archives (même en cas d'échec partiel)
        run: |
          git config user.name "canadair-collect[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add data/archive
          if git diff --cached --quiet; then
            echo "Aucune nouvelle trace aujourd'hui."
          else
            git commit -m "archive: traces du $(date -u +%F)"
            # un push d'Henri a pu arriver pendant la collecte
            git pull --rebase origin main
            git push
          fi
      - name: Refléter l'échec de collecte
        if: steps.collect.outcome == 'failure'
        run: |
          echo "::error::Au moins un téléchargement de trace a échoué — voir le log du step collect"
          exit 1
